services:
  - type: web
    name: bupulse-backend
    plan: free
    rootDir: backend
    buildpacks:
      - url: https://github.com/render-examples/render-buildpack-google-chrome
      - url: render/node
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: PUPPETEER_SKIP_CHROMIUM_DOWNLOAD
        value: "true"
      - key: PUPPETEER_EXECUTABLE_PATH
        value: /usr/bin/google-chrome-stable
