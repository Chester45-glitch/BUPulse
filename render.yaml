# ─────────────────────────────────────────────────────────────────
# render.yaml — BUPulse Render deployment config
# ─────────────────────────────────────────────────────────────────
services:
  - type: web
    name: bupulse-backend
    runtime: docker                    
    rootDir: backend                   # Sets the build context to the backend folder
    dockerfilePath: ./backend/Dockerfile # <--- FIXED: Tells Render exactly where the Dockerfile lives now
    plan: starter                      
    region: singapore                  
    branch: main                       

    # ── Health check ────────────────────────────────────────────
    healthCheckPath: /api/health

    # ── Environment variables ────────────────────────────────────
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3001"
      - key: BULMS_HEADLESS
        value: "true"
      - key: PUPPETEER_CACHE_DIR
        value: /app/.cache/puppeteer

      # ── Set these in Render Dashboard → Environment ──────────
      # SUPABASE_URL
      # SUPABASE_SERVICE_ROLE_KEY
      # GOOGLE_CLIENT_ID
      # GOOGLE_CLIENT_SECRET
      # GOOGLE_REDIRECT_URI        
      # JWT_SECRET
      # SESSION_SECRET
      # FRONTEND_URL               
      # BULMS_URL                  
      # BULMS_COOKIE_KEY
