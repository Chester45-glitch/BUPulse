services:
  - type: web
    name: bupulse-backend
    runtime: node
    # Add this line so Render knows where the backend code is
    rootDirectory: backend 
    buildCommand: apt-get update && apt-get install -y chromium-browser && npm install
    startCommand: node server.js
    envVars:
      - key: PUPPETEER_SKIP_CHROMIUM_DOWNLOAD
        value: true
      - key: PUPPETEER_EXECUTABLE_PATH
        value: /usr/bin/chromium-browser
    buildpacks:
      - url: https://github.com/render-examples/render-buildpack-google-chrome
