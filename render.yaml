services:
  - type: web
    name: bupulse-backend
    env: docker
    plan: free
    rootDir: backend
    envVars:
      - key: PORT
        value: 10000
      - key: SUPABASE_URL
        sync: false # Render will ask you to type this in the dashboard
      - key: SUPABASE_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
